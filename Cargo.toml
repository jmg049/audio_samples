[package]
name = "audio_samples"
version = "1.0.3"
edition = "2024"
authors = ["Jack Geraghty <jgeraghty049@gmail.com>"]
license = "MIT"
readme = "README.md"
homepage = "https://github.com/jmg049/audio_samples"
repository = "https://github.com/jmg049/audio_samples"
documentation = "https://docs.rs/audio_samples"
description = "A typed audio processing library for Rust that treats audio as a first-class, invariant-preserving object rather than an unstructured numeric buffer."

keywords = ["audio", "dsp", "api"]
categories = ["encoding", "multimedia", "science"]

[lib]
name = "audio_samples"
crate-type = ["rlib"]

[dependencies]
bytemuck = "1.25.0"
ndarray = "0.17"
num-traits = "0.2"
thiserror = "2.0"
num-complex = "0.4"
i24 = { version = "2.3.3", features = [
    "alloc",
    "num-cast",
    "ndarray",
    "std",
    "serde",
] }

serde = { version = "1.0", features = ["derive"] }
lazy_static = "1.5"
num-format = { version = "0.4.4", optional = true }
rand = { version = "0.10.0", optional = true }
wide = "1.2.0"
spectrograms = { version = "1.1.0", optional = true }

serde_json = { version = "1.0.149", optional = true }

plotly = { version = "0.14.1", optional = true }
plotly_static = { version = "0.1.0", features = [
    "chromedriver",
    "webdriver_download",
], optional = true }
html_view = { version = "0.2.2", optional = true }
base64 = { version = "0.22", optional = true }

rubato = { version = "1.0.1", optional = true }
rayon = { version = "1", optional = true }

regex = ">=1.12"
rustfft = ">=6.2"
non-empty-slice = ">=0.5"
non-empty-iter = ">=0.2"
audioadapter = "2.0.0"
audioadapter-buffers = "2.0.0"

[features]
# Minimal core (no heavy dependencies)
default = ["bare-bones"]

# Core operation categories
statistics = [] # Basic stats: peak, rms, mean
processing = ["statistics"] # Basic processing: normalize, scale, clip
transforms = ["dep:spectrograms"]
editing = ["statistics", "random-generation"] # Time operations: trim, pad, reverse (includes noise)
beat-tracking = [] # Beat tracking operations
onset-detection = ["transforms", "peak-picking", "processing"] # Onset detection operations
decomposition = ["onset-detection"] # Audio decomposition operations (requires serialization)
dynamic-range = [] # Dynamic range compression/expansion operations
channels = [] # Channel operations: interleave/deinterleave
iir-filtering = [] # IIR filtering operations
parametric-eq = ["iir-filtering"] # Parametric equalization operations
peak-picking = [] # Peak picking operations
pitch-analysis = ["transforms"] # Pitch analysis operations
resampling = ["dep:rubato", "dep:rayon"]
vad = [] # Voice activity detection operations
plotting = ["dep:plotly", "dep:base64", "dep:serde_json"]
envelopes = ["dynamic-range", "editing", "random-generation"] # Envelope generation operations
dithering = ["random-generation"] # Dithering and noise-shaping operations
fixed-size-audio = [] # Support for fixed-size audio buffers (no heap allocation)

full = [
    "statistics",
    "editing",
    "transforms",
    "channels",
    "resampling",
    "fixed-size-audio",
    "beat-tracking",
    "onset-detection",
    "decomposition",
    "dynamic-range",
    "parametric-eq",
    "peak-picking",
    "pitch-analysis",
    "processing",
    "vad",
    "iir-filtering",
    "plotting",
    "envelopes",
    "dithering",
    "random-generation",
]

full_no_plotting = [
    "statistics",
    "editing",
    "transforms",
    "channels",
    "resampling",
    "fixed-size-audio",
    "beat-tracking",
    "onset-detection",
    "decomposition",
    "dynamic-range",
    "parametric-eq",
    "peak-picking",
    "pitch-analysis",
    "processing",
    "vad",
    "iir-filtering",
    "envelopes",
    "dithering",
    "random-generation",
]

bare-bones = [] # No features, just the core API and basic types

# Plotting sub-features (require plotting)
static-plots = ["plotting", "dep:plotly_static"]
simd = []
random-generation = ["dep:rand"]
python = ["i24/pyo3"]
html_view = ["dep:html_view"]

[dev-dependencies]
approx_eq = "0.1.8"
clap = { version = "4.6.0", features = ["derive"] }
dtmf_tones = "1.0.1"
rand = "0.10.0"
criterion = { version = "0.8.2", features = ["html_reports"] }
proptest = "1.10.0"

[[bench]]
name = "ffmpeg_comparison"
harness = false
required-features = ["resampling", "iir-filtering", "channels", "processing", "statistics", "editing"]

[patch.crates-io]
audio_samples = { path = "." }
